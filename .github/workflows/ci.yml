name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Frontend build, lint, type check, and unit tests
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

  # E2E tests with Playwright
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Smart contracts compile and test
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking while debugging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check contracts folder
        run: |
          echo "=== contracts folder ==="
          ls -la contracts/
          echo "=== contracts/contracts folder ==="
          ls -la contracts/contracts/ | head -20
          echo "=== package.json ==="
          cat contracts/package.json

      - name: Install contract dependencies
        working-directory: ./contracts
        run: npm install --legacy-peer-deps

      - name: Compile contracts
        working-directory: ./contracts
        run: npx hardhat compile

      - name: Run contract tests
        working-directory: ./contracts
        run: npx hardhat test

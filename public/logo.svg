<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FACFE;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner shadow -->
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background orb with subtle gradient -->
  <circle cx="60" cy="60" r="50" fill="url(#mainGradient)" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Main arc symbol - modern minimalist design -->
  <g filter="url(#glow)">
    <!-- Outer arc (represents growth/upward trend) -->
    <path 
      d="M 30 70 Q 60 25 90 70" 
      stroke="url(#mainGradient)" 
      stroke-width="6" 
      fill="none" 
      stroke-linecap="round"
      opacity="0.8"
    />
    
    <!-- Inner arc (represents stability) -->
    <path 
      d="M 38 70 Q 60 38 82 70" 
      stroke="url(#mainGradient)" 
      stroke-width="5" 
      fill="none" 
      stroke-linecap="round"
      opacity="0.6"
    />
    
    <!-- Center node (treasury core) -->
    <circle cx="60" cy="60" r="12" fill="url(#mainGradient)" filter="url(#innerShadow)"/>
    <circle cx="60" cy="60" r="8" fill="#0A0E27" opacity="0.6"/>
    
    <!-- Currency symbols arranged in triangle -->
    <g transform="translate(60, 60)">
      <!-- USDC (top) -->
      <text x="-4" y="-16" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4FACFE">$</text>
      <!-- EURC (bottom-left) -->
      <text x="-17" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#00D4AA">€</text>
      <!-- XSGD (bottom-right) -->
      <text x="10" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#10B981">¥</text>
    </g>
    
    <!-- Connection lines (representing balance/rebalancing) -->
    <line x1="60" y1="44" x2="43" y2="68" stroke="#4FACFE" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="60" y1="44" x2="77" y2="68" stroke="#10B981" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="43" y1="68" x2="77" y2="68" stroke="#00D4AA" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative particles -->
  <circle cx="25" cy="35" r="2.5" fill="#4FACFE" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="95" cy="35" r="2" fill="#00D4AA" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="85" r="1.5" fill="#10B981" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="80" r="2" fill="#4FACFE" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>

